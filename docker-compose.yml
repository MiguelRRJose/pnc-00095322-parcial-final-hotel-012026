version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: hotel_db
    environment:
      POSTGRES_DB: ParcialFinalNCapas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: WMJM261202261202jm--
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: hotel_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: ParcialFinalNCapas
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: miClaveSecretaSuperLargaParaJWTQueDebeTener256Bits!!
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ParcialFinalNCapas
    ports:
      - "8080:8080"

volumes:
  postgres_data: