spring:
  application:
    name: pnc-parcial-final-hotel

  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:miClaveSecretaSuperLargaParaJWTQueDebeTener256Bits!!}
    expiration-ms: 900000        # 15 minutos
    refresh-expiration-ms: 604800000  # 7 días